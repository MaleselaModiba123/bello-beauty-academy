# CI/CD Pipeline — Bello Beauty Academy Platform
# Runs all tests on every push and pull request
# Builds and uploads a release JAR artifact on merge to main

name: CI/CD Pipeline

on:
  # trigger on push to any branch
  push:
    branches:
      - '**'
  # trigger on pull requests targeting main
  pull_request:
    branches:
      - main

jobs:

  # ─── Job 1: Run all tests ──────────────────────────────────────────────────
  test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Java 21 — matches the version used in development
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Step 3: Cache Maven dependencies to speed up future runs
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # Step 4: Run all tests — workflow fails if any test fails
      - name: Run all tests
        run: mvn clean test

      # Step 5: Upload test reports so they are visible in the Actions run summary
      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 7

  # ─── Job 2: Build release JAR — only runs on main branch ──────────────────
  release:
    name: Build Release Artifact
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      # Step 1: Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Java 21
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Step 3: Restore cached Maven dependencies
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # Step 4: Build the release JAR — skips tests since job 1 already ran them
      - name: Build release JAR
        run: mvn package -DskipTests

      # Step 5: Upload the JAR as a downloadable artifact in the Actions run summary
      - name: Upload release JAR
        uses: actions/upload-artifact@v4
        with:
          name: bello-beauty-academy-${{ github.sha }}
          path: target/glowskills-academy-platform-1.0.0.jar
          retention-days: 30